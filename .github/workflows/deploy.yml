name: Deploy BotClínica

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Atualiza VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.242.43
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            pm2 restart botclinica-multitenant
            pm2 restart botclinica-vendas
            pm2 save
            echo "VPS atualizada!"

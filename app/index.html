  const saveDoc=()=>{if(!nd.name.trim())return;const cols=["#1A6FA8","#0D9B6E","#7C3AED","#D97706","#BE185D"];setDocs(p=>[...p,{...nd,id:Date.now(),active:true,color:cols[p.length%cols.length],s:{today:0,res:0,pend:0,week:0}}]);setNd({name:"",spec:"",crm:"",days:"",times:"",bot:"",tone:"cordial",preco:""});setShowAdd(false);};

  const fld={width:"100%",background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"};

                    <Bdg status={c.status}/>

          {/* MÉDICOS */}

              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:12}}>
                {[["Nome completo","name","Dra. Ana Silva"],["Especialidade","spec","Dermatologia"],["CRM","crm","CRM-MG 12345"],["Dias de atendimento","days","Terças e Quintas"],["Horários","times","9h–12h"],["Nome do bot","bot","Sofia"],["Valor da consulta","preco","R$ 250,00"]].map(([l,k,ph])=>(
                  <div key={k}><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:500}}>{l}</label><input value={nd[k]} placeholder={ph} onChange={e=>setNd(p=>({...p,[k]:e.target.value}))} style={fld}/></div>

              <div style={{marginBottom:13}}><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:500}}>Tom do bot</label>

              </div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={saveDoc} style={{background:T.accent,border:"none",borderRadius:8,padding:"8px 17px",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:5}}><I.Save s={12} c="#fff"/> Salvar</button>
                <button onClick={()=>setShowAdd(false)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 17px",color:T.muted,cursor:"pointer",fontSize:13}}>Cancelar</button>
              </div>
            </Card>}
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {docs.map(doc=>(

                      <div><div style={{fontWeight:700,fontSize:14,color:T.text}}>{doc.name}</div><div style={{color:T.muted,fontSize:12,marginTop:2}}>{doc.spec} · {doc.crm}</div><div style={{color:T.muted,fontSize:12,marginTop:2}}>📅 {doc.days} · {doc.times}</div></div>
                    </div>
                    <div style={{background:T.subtle,borderRadius:10,padding:"10px 13px"}}>
                      <div style={{color:T.muted,fontSize:10,textTransform:"uppercase",letterSpacing:".8px",marginBottom:6,fontWeight:600}}>Bot configurado</div>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}><I.Bot s={12} c={T.accent}/><span style={{fontWeight:700,fontSize:13,color:T.text}}>{doc.bot}</span><span style={{background:T.accentL,color:T.accent,fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:600}}>{TONES[doc.tone]}</span></div>
                      <div style={{display:"flex",gap:13}}>{[["Hoje",doc.s.today,T.accent],["Resolv.",doc.s.res,T.green],["Semana",doc.s.week,T.purple]].map(([l,v,c])=><div key={l} style={{textAlign:"center"}}><div style={{color:c,fontWeight:700,fontSize:16,lineHeight:1}}>{v}</div><div style={{color:T.muted,fontSize:10,marginTop:2}}>{l}</div></div>)}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                      <span style={{background:doc.active?T.greenL:T.subtle,color:doc.active?T.green:T.muted,borderRadius:20,fontSize:10,padding:"3px 10px",fontWeight:600}}>{doc.active?"● Online":"● Inativo"}</span>
                      <button onClick={()=>{changeDoc(doc);go("simulador");}} style={{background:T.accentL,border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 11px",color:T.accent,fontSize:11,cursor:"pointer",fontWeight:600,display:"flex",alignItems:"center",gap:4}}><I.Zap s={11} c={T.accent}/> Testar</button>
                      <button onClick={()=>setEditDoc(editDoc?.id===doc.id?null:{...doc})} style={{background:editDoc?.id===doc.id?T.warnL:"none",border:`1px solid ${editDoc?.id===doc.id?T.warn:T.border}`,borderRadius:8,padding:"5px 11px",color:editDoc?.id===doc.id?T.warn:T.muted,fontSize:11,cursor:"pointer",fontWeight:editDoc?.id===doc.id?600:400,display:"flex",alignItems:"center",gap:4}}><I.Save s={11} c={editDoc?.id===doc.id?T.warn:T.muted}/> {editDoc?.id===doc.id?"Cancelar":"Editar"}</button>
                      <button onClick={()=>setDocs(p=>p.map(d=>d.id===doc.id?{...d,active:!d.active}:d))} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 11px",color:T.muted,fontSize:11,cursor:"pointer"}}>{doc.active?"Desativar":"Ativar"}</button>
                    </div>
                  </div>
                </Card>
                {editDoc?.id===doc.id&&(

                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:12}}>

                    <div style={{marginBottom:14}}><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:500}}>Tom do bot</label>

              <span style={{fontSize:17}}>🔔</span>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:12.5,color:T.danger}}>Demonstrar notificações ao cliente</div><div style={{color:T.muted,fontSize:11}}>Clique para simular som + alerta visual instantaneamente.</div></div>

            <div style={{display:"flex",gap:21,alignItems:"flex-start"}}>
              <div style={{flexShrink:0}}>
                <div style={{background:"#1C1C1E",borderRadius:38,padding:"11px",boxShadow:"0 18px 55px rgba(0,0,0,.3)",border:"2px solid #2C2C2E",width:320}}>

                  <div style={{background:"#075E54",padding:"8px 13px",display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:31,height:31,borderRadius:"50%",background:simDoc.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,color:"#fff"}}>{simDoc.bot[0]}</div>
                    <div><div style={{color:"#fff",fontWeight:600,fontSize:12}}>{simDoc.bot}</div><div style={{color:"rgba(255,255,255,.7)",fontSize:9}}>{simDoc.name} · {simDoc.spec}</div></div>
                  </div>
                  <div style={{background:T.chat,minHeight:400,maxHeight:400,overflow:"auto",padding:"10px 9px",display:"flex",flexDirection:"column",gap:7}}>
                    {simMsgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.f==="p"?"flex-end":"flex-start"}}><div style={{maxWidth:"82%",padding:"7px 11px",lineHeight:1.5,wordBreak:"break-word",borderRadius:m.f==="p"?"12px 12px 2px 12px":"12px 12px 12px 2px",background:m.f==="p"?T.chatPat:T.chatBot,color:dark?"#e8f0ea":"#111",fontSize:12,boxShadow:"0 1px 2px rgba(0,0,0,.1)"}}>{m.t}<div style={{color:"#999",fontSize:9,textAlign:"right",marginTop:2}}>✓✓</div></div></div>)}
                    {simLoad&&<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{background:T.chatBot,padding:"7px 12px",borderRadius:"12px 12px 12px 2px",color:T.muted,fontSize:11}}>{simDoc.bot} está digitando{dots}</div></div>}
                    <div ref={endRef}/>
                  </div>
                  <div style={{background:"#F0F0F0",padding:"6px 8px",display:"flex",gap:6,alignItems:"center"}}>
                    <input value={simIn} onChange={e=>setSimIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendSim()} placeholder="Mensagem" style={{flex:1,background:"#fff",border:"none",borderRadius:20,padding:"7px 12px",color:"#111",fontSize:12,outline:"none"}}/>
                    <button onClick={sendSim} disabled={simLoad} style={{width:32,height:32,borderRadius:"50%",background:"#25D366",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:simLoad?.6:1}}><I.Send s={12} c="#fff"/></button>

                </div>
                <button onClick={()=>changeDoc(simDoc)} style={{width:"100%",marginTop:8,padding:8,background:"none",border:`1px solid ${T.border}`,borderRadius:10,color:T.muted,cursor:"pointer",fontSize:12}}>↺ Reiniciar conversa</button>

              <div style={{flex:1,display:"flex",flexDirection:"column",gap:13}}>
                <Card style={{padding:"17px"}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:T.text}}>💡 Sugestões para testar</div>

                      <div><div style={{color:T.text,fontSize:12.5,fontWeight:500}}>"{msg}"</div><div style={{color:msg.includes("atendente")?T.danger:T.muted,fontSize:11,marginTop:2}}>{desc}</div></div>
                      <I.Right s={12} c={T.muted}/>
                    </button>
                  ))}
                </Card>
                <Card style={{padding:"15px 17px",borderLeft:`4px solid ${simDoc.color}`,borderRadius:"0 14px 14px 0"}}>
                  <div style={{fontWeight:600,fontSize:12,marginBottom:8,color:simDoc.color}}>Bot ativo: {simDoc.bot}</div>
                  <div style={{fontSize:12,lineHeight:1.9,color:T.text}}><span style={{color:T.muted}}>Médico:</span> {simDoc.name}<br/><span style={{color:T.muted}}>Especialidade:</span> {simDoc.spec}<br/><span style={{color:T.muted}}>Atende:</span> {simDoc.days}<br/><span style={{color:T.muted}}>Tom:</span> {TONES[simDoc.tone]}</div>
                </Card>
              </div>
            </div>
          </div>}

          {/* CONFIGURAÇÕES */}
          {page==="configurar"&&<div style={{flex:1,overflowY:"auto",padding:"20px 22px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
              <div><h1 style={{color:T.text,fontSize:20,fontWeight:700,margin:0}}>Configurações</h1><p style={{color:T.muted,fontSize:12,margin:"3px 0 0"}}>Dados gerais da clínica e automações</p></div>
              <button onClick={()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);}} style={{background:saved?T.green:T.accent,border:"none",borderRadius:10,padding:"8px 18px",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:5}}><I.Save s={12} c="#fff"/>{saved?"Salvo ✓":"Salvar alterações"}</button>

                {[["Nome da clínica","name"],["Telefone geral","phone"],["Horário de funcionamento","hours"]].map(([l,k])=>(
                  <div key={k} style={{marginBottom:12}}><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:500}}>{l}</label><input value={cfg[k]} onChange={e=>setCfg(p=>({...p,[k]:e.target.value}))} style={fld}/></div>

              <Card style={{padding:"19px"}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:T.text}}>🩺 Especialidades</div>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
                  {cfg.svcs.map((s,i)=>(
                    <div key={i} style={{display:"flex",gap:6,alignItems:"center"}}>
                      <div style={{flex:1,background:T.subtle,border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 11px",color:T.text,fontSize:13}}>{s}</div>
                      <button onClick={()=>setCfg(p=>({...p,svcs:p.svcs.filter((_,j)=>j!==i)}))} style={{background:T.dangerL,border:"none",borderRadius:8,padding:"7px 8px",color:T.danger,cursor:"pointer"}}><I.Trash s={12} c={T.danger}/></button>

                  <input value={nSvc} onChange={e=>setNSvc(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nSvc.trim()){setCfg(p=>({...p,svcs:[...p.svcs,nSvc.trim()]}));setNSvc("");}}} placeholder="Adicionar especialidade..." style={{...fld,flex:1}}/>
                  <button onClick={()=>{if(nSvc.trim()){setCfg(p=>({...p,svcs:[...p.svcs,nSvc.trim()]}));setNSvc("");}}} style={{background:T.accentL,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px",color:T.accent,cursor:"pointer",fontWeight:600,fontSize:12,whiteSpace:"nowrap"}}>Adicionar</button>
                </div>
              </Card>
            </div>
            <Card style={{padding:"19px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:15}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}>
                  <div style={{background:T.warnL,borderRadius:10,padding:9}}><I.Bell s={16} c={T.warn}/></div>
                  <div><div style={{fontWeight:700,fontSize:13,color:T.text}}>🔔 Lembretes automáticos</div><div style={{color:T.muted,fontSize:12}}>Reduz faltas em até 40%</div></div>

                    <div key={k} onClick={()=>setLem(p=>({...p,[k]:!p[k]}))} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",cursor:"pointer",marginBottom:6,borderRadius:10,border:`1.5px solid ${lem[k]?T.green:T.border}`,background:lem[k]?T.greenL:"transparent"}}>

                </div>
                <div><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:6,fontWeight:500}}>Mensagem do lembrete</label>
                  <textarea value={lem.msg} onChange={e=>setLem(p=>({...p,msg:e.target.value}))} rows={3} style={{...fld,resize:"vertical",lineHeight:1.6}}/>
                </div>
              </div>}
            </Card>

            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:13,marginBottom:13}}>
              <Card style={{padding:"17px"}}><div style={{fontWeight:600,fontSize:13,marginBottom:14,color:T.text}}>Atendimentos por dia — por médico</div><div style={{height:190}}><StackedBar/></div><div style={{display:"flex",gap:13,justifyContent:"center",marginTop:9}}>{[["#1A6FA8","Dermatologia"],["#0D9B6E","Cardiologia"],["#7C3AED","Clínica Geral"]].map(([c,l])=><div key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}><div style={{width:9,height:9,borderRadius:2,background:c}}/><span style={{color:T.muted}}>{l}</span></div>)}</div></Card>
              <Card style={{padding:"17px"}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:12,color:T.text}}>Taxa de resolução</div>
                <div style={{height:165}}><Donut/></div>
                {[["#1A6FA8","Bot resolveu","85%"],["#E4EAF0","Transferido","15%"]].map(([c,l,v])=><div key={l} style={{display:"flex",alignItems:"center",gap:7,fontSize:12,marginTop:7}}><div style={{width:9,height:9,borderRadius:3,background:c,flexShrink:0}}/><span style={{color:T.muted,flex:1}}>{l}</span><span style={{color:T.text,fontWeight:700}}>{v}</span></div>)}
              </Card>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13}}>
              <Card style={{padding:"17px"}}><div style={{fontWeight:600,fontSize:13,marginBottom:13,color:T.text}}>Volume por horário (hoje)</div><div style={{height:135}}><HourBar/></div></Card>
              <Card style={{padding:"17px"}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:12,color:T.text}}>Performance por médico</div>
                {docs.map(doc=>(
                  <div key={doc.id} style={{display:"flex",alignItems:"center",gap:11,marginBottom:11}}>
                    <Av ini={docIni(doc)} c={doc.color} sz={30}/>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:600,color:T.text}}>{doc.name.split(" ").slice(0,2).join(" ")}</span><span style={{fontSize:12,color:doc.color,fontWeight:700}}>{Math.round(doc.s.res/Math.max(doc.s.today,1)*100)}%</span></div>
                      <div style={{height:5,background:T.border,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",background:doc.color,borderRadius:3,width:`${Math.round(doc.s.res/Math.max(doc.s.today,1)*100)}%`,transition:"width .5s"}}/></div>
                    </div>
                  </div>
                ))}
              </Card>
            </div>
          </div>}

        </main>
      </div>
    </ThemeCtx.Provider>
  );
}



/* ── LOGIN ── */
function Login({onLogin}){
  const [em,setEm]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [mode,setMode]=useState("in");
  const [cn,setCn]=useState("");
  const T=LIGHT;
  const sub=async()=>{
    if(!em||!pw)return setErr("Preencha todos os campos.");
    if(mode==="up"&&!cn)return setErr("Informe o nome da clínica.");
    setBusy(true);setErr("");
    try{
      if(mode==="in"){
        await window.__fb.signIn(em,pw);
      }else{
        const c=await window.__fb.createUser(em,pw);
        await window.__fb.setClinic(c.user.uid,{clinicName:cn,email:em,phone:"",hours:"Seg-Sex: 8h-18h",botName:"Sofia",tone:"cordial",services:[]});
      }
    }catch(e){setErr(e.message.replace("Firebase: ","").replace(/\(auth.*\)/,"").trim());setBusy(false);}
  };
  const forgot=async()=>{
    if(!em)return alert("Digite seu email primeiro.");
    try{await window.__fb.reset(em);alert("Email enviado! Verifique sua caixa 📧");}
    catch(e){alert(e.message);}
  };
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg}}>
      <div style={{background:T.card,borderRadius:16,padding:"36px 32px",width:360,boxShadow:"0 8px 40px rgba(0,0,0,.12)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40,marginBottom:8}}>🤖</div>
          <div style={{fontWeight:700,fontSize:20,color:T.text}}>AtendIA</div>
          <div style={{fontSize:13,color:T.muted,marginTop:4}}>{mode==="in"?"Acesse sua conta":"Crie sua conta"}</div>
        </div>
        {mode==="up"&&<input value={cn} onChange={e=>setCn(e.target.value)} placeholder="Nome da clínica" style={{width:"100%",border:"1px solid "+T.border,borderRadius:10,padding:"11px 14px",fontSize:14,marginBottom:10,boxSizing:"border-box",background:T.bg,color:T.text,outline:"none"}}/>}
        <input value={em} onChange={e=>setEm(e.target.value)} placeholder="Email" type="email" style={{width:"100%",border:"1px solid "+T.border,borderRadius:10,padding:"11px 14px",fontSize:14,marginBottom:10,boxSizing:"border-box",background:T.bg,color:T.text,outline:"none"}}/>
        <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="Senha" type="password" onKeyDown={e=>e.key==="Enter"&&sub()} style={{width:"100%",border:"1px solid "+T.border,borderRadius:10,padding:"11px 14px",fontSize:14,marginBottom:4,boxSizing:"border-box",background:T.bg,color:T.text,outline:"none"}}/>
        {err&&<div style={{color:"#E03E3E",fontSize:12,marginBottom:8,textAlign:"center"}}>{err}</div>}
        <button onClick={sub} disabled={busy} style={{width:"100%",background:T.accent,border:"none",borderRadius:10,padding:"13px",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginTop:8,opacity:busy?0.7:1}}>
          {busy?"Aguarde...":(mode==="in"?"Entrar":"Criar conta")}
        </button>
        {mode==="in"&&<div style={{textAlign:"center",marginTop:8}}>
          <button onClick={forgot} style={{background:"none",border:"none",color:T.accent,cursor:"pointer",fontSize:13,textDecoration:"underline"}}>Esqueci minha senha</button>
        </div>}
        <div style={{textAlign:"center",marginTop:14,fontSize:13,color:T.muted}}>
          {mode==="in"?"Não tem conta? ":"Já tem conta? "}
          <button onClick={()=>{setMode(m=>m==="in"?"up":"in");setErr("");}} style={{background:"none",border:"none",color:T.accent,cursor:"pointer",fontWeight:600,fontSize:13}}>{mode==="in"?"Criar conta":"Entrar"}</button>
        </div>
      </div>
    </div>
  );
}

/* ── ROOT ── */
function Root(){
  const [user,setUser]=useState(undefined);
  useEffect(()=>{
    return window.__fb.onAuth(function(u){setUser(u);});
  },[]);
  if(user===undefined)return null;
  if(!user)return <Login/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);

</script>

<script>
(function(){
  var PROXY="/api/fb";
  var _cbs=[];

  async function call(action,payload){
    var r=await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:action,payload:payload})});
    return await r.json();
  }
  function saveSession(d){
    localStorage.setItem("_fbt",d.idToken||d.id_token||"");
    localStorage.setItem("_fbr",d.refreshToken||d.refresh_token||"");
    localStorage.setItem("_fbe",Date.now()+(parseInt(d.expiresIn||d.expires_in||3600))*1000);
  }
  function clearSession(){localStorage.removeItem("_fbt");localStorage.removeItem("_fbr");localStorage.removeItem("_fbe");}
  function notify(u){_cbs.forEach(function(c){c(u);});}
  async function getToken(){
    var t=localStorage.getItem("_fbt"),exp=parseInt(localStorage.getItem("_fbe")||"0");
    if(!t)return null;
    if(Date.now()>exp-60000){
      var rt=localStorage.getItem("_fbr");if(!rt)return null;
      var d=await call("refreshToken",{refresh_token:rt});
      if(d.id_token){saveSession(d);return d.id_token;}
      return null;
    }
    return t;
  }
  async function initAuth(){
    var t=await getToken();
    if(!t){notify(null);return;}
    var d=await call("lookup",{idToken:t});
    if(d.users&&d.users[0])notify({uid:d.users[0].localId,email:d.users[0].email});
    else{clearSession();notify(null);}
  }
  window.__fb={
    signIn:async function(em,pw){
      var d=await call("signIn",{email:em,password:pw,returnSecureToken:true});
      if(d.error)throw new Error(d.error.message.replace(/_/g," ").toLowerCase());
      saveSession(d);var u={uid:d.localId,email:d.email};notify(u);return{user:u};
    },
    createUser:async function(em,pw){
      var d=await call("signUp",{email:em,password:pw,returnSecureToken:true});
      if(d.error)throw new Error(d.error.message.replace(/_/g," ").toLowerCase());
      saveSession(d);var u={uid:d.localId,email:d.email};notify(u);return{user:u};
    },
    signOut:async function(){clearSession();notify(null);},
    reset:async function(em){
      var d=await call("reset",{requestType:"PASSWORD_RESET",email:em});
      if(d.error)throw new Error(d.error.message);
    },
    onAuth:function(cb){
      _cbs.push(cb);initAuth();
      return function(){_cbs=_cbs.filter(function(c){return c!==cb;});};
    },
    setClinic:async function(uid,data){
      var t=await getToken();
      var d=await call("setClinic",{uid:uid,data:data,token:t});
      if(d.error)throw new Error(d.error.message);
      return d;
    }
  };
})();
</script>

(function(){
  // ── PROFILE MODAL ──
  var modal = document.createElement('div');
  modal.id = 'profile-modal';
  modal.innerHTML = `
    <div id="profile-modal-box">
      <h2>⚙️ Perfil da clínica</h2>
      <div class="logo-upload-area">
        <div class="logo-preview" id="logo-preview-big">

        </div>
        <div class="logo-upload-info">
          <p>Adicione o logotipo da sua clínica</p>
          <label class="btn-upload" for="logo-file-input">📷 Escolher imagem</label>
          <input type="file" id="logo-file-input" accept="image/*" style="display:none"/>
        </div>
      </div>
      <div class="profile-field">
        <label>Nome da clínica</label>
        <input id="pf-nome" placeholder="Ex: Clínica São Lucas"/>
      </div>
      <div class="profile-field">
        <label>Telefone de contato</label>
        <input id="pf-tel" placeholder="+55 31 9 0000-0000"/>
      </div>
      <div class="profile-field">
        <label>Endereço</label>
        <input id="pf-end" placeholder="Rua, número, cidade"/>
      </div>
      <div class="profile-actions">
        <button class="btn-cancel" onclick="closeProfile()">Cancelar</button>
        <button class="btn-save-profile" onclick="saveProfile()">💾 Salvar perfil</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', function(e){ if(e.target===modal) closeProfile(); });

  // File input
  document.getElementById('logo-file-input').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      var data = ev.target.result;
      localStorage.setItem('clinic_logo', data);
      updateLogoDisplay(data);
    };
    reader.readAsDataURL(file);
  });

  function updateLogoDisplay(data){
    // Modal
    var imgBig = document.getElementById('logo-img-big');
    var initBig = document.getElementById('logo-initial');
    if(data){ imgBig.src=data; imgBig.style.display='block'; if(initBig) initBig.style.display='none'; }
    // Sidebar
    var sideImg = document.getElementById('sidebar-logo-img');
    var sideInit = document.getElementById('sidebar-logo-initial');
    if(sideImg && data){ sideImg.src=data; sideImg.style.display='block'; if(sideInit) sideInit.style.display='none'; }
  }

  window.openProfile = function(){
    modal.classList.add('open');
    // Preencher campos salvos
    var nome = localStorage.getItem('clinic_nome') || '';
    var tel  = localStorage.getItem('clinic_tel')  || '';
    var end  = localStorage.getItem('clinic_end')  || '';
    var logo = localStorage.getItem('clinic_logo') || '';
    document.getElementById('pf-nome').value = nome;
    document.getElementById('pf-tel').value  = tel;
    document.getElementById('pf-end').value  = end;
    if(logo) updateLogoDisplay(logo);
  };
  window.closeProfile = function(){ modal.classList.remove('open'); };
  window.saveProfile  = function(){
    var nome = document.getElementById('pf-nome').value.trim();
    var tel  = document.getElementById('pf-tel').value.trim();
    var end  = document.getElementById('pf-end').value.trim();
    if(nome) localStorage.setItem('clinic_nome', nome);
    if(tel)  localStorage.setItem('clinic_tel',  tel);
    if(end)  localStorage.setItem('clinic_end',  end);
    // Atualizar nome no sidebar
    var nameEl = document.getElementById('sidebar-clinic-name');
    if(nameEl && nome) nameEl.textContent = nome;
    closeProfile();
    // Toast
    var t=document.createElement('div');
    t.className='toast';
    t.style.cssText='position:fixed;bottom:24px;right:24px;background:#fff;border:1px solid #10B981;border-radius:10px;padding:12px 18px;font-size:13px;color:#10B981;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.1)';
    t.textContent='✅ Perfil atualizado!';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3000);
  };

  // ── INJETAR PERFIL NO SIDEBAR ──
  function injectSidebarProfile(){
    // Encontrar o sidebar (nav ou div fixo com 220px de largura)
    var sidebar = document.querySelector('div[style*="position: fixed"][style*="220px"]') ||
                  document.querySelector('div[style*="position:fixed"][style*="220px"]');
    if(!sidebar || document.getElementById('clinic-profile')) return;

    var nome  = localStorage.getItem('clinic_nome') || 'Minha Clínica';
    var email = document.querySelector('input[type="email"]')?.value || '';
    var logo  = localStorage.getItem('clinic_logo') || '';
    var init  = nome.charAt(0).toUpperCase();

    var profile = document.createElement('div');
    profile.id = 'clinic-profile';
    profile.onclick = openProfile;
    profile.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px">
        <div class="clinic-logo">
          <span id="sidebar-logo-initial" style="${logo?'display:none':''}">${init}</span>
          <img id="sidebar-logo-img" src="${logo}" style="${logo?'':'display:none'};width:100%;height:100%;object-fit:cover"/>
        </div>
        <div style="flex:1;min-width:0">
          <div class="clinic-name" id="sidebar-clinic-name">${nome}</div>
          <div class="clinic-email">Editar perfil →</div>
        </div>
        <div style="color:rgba(255,255,255,.3);font-size:12px">⚙️</div>
      </div>
    `;

    // Inserir antes do botão de logout (último filho do sidebar)
    var logoutBtn = sidebar.querySelector('button');
    var lastDiv = sidebar.lastElementChild;
    sidebar.insertBefore(profile, lastDiv);
  }

  // Tentar injetar após o React renderizar
  var tries = 0;
  var interval = setInterval(function(){
    injectSidebarProfile();
    tries++;
    if(tries > 20 || document.getElementById('clinic-profile')) clearInterval(interval);
  }, 500);
})();
</script>

<script>
(function(){
  var PROXY="/api/fb";
  var _cbs=[];

  async function call(action,payload){
    var r=await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:action,payload:payload})});
    return await r.json();
  }
  function saveSession(d){
    localStorage.setItem("_fbt",d.idToken||d.id_token||"");
    localStorage.setItem("_fbr",d.refreshToken||d.refresh_token||"");
    localStorage.setItem("_fbe",Date.now()+(parseInt(d.expiresIn||d.expires_in||3600))*1000);
  }
  function clearSession(){localStorage.removeItem("_fbt");localStorage.removeItem("_fbr");localStorage.removeItem("_fbe");}
  function notify(u){_cbs.forEach(function(c){c(u);});}
  async function getToken(){
    var t=localStorage.getItem("_fbt"),exp=parseInt(localStorage.getItem("_fbe")||"0");
    if(!t)return null;
    if(Date.now()>exp-60000){
      var rt=localStorage.getItem("_fbr");if(!rt)return null;
      var d=await call("refreshToken",{refresh_token:rt});
      if(d.id_token){saveSession(d);return d.id_token;}
      return null;
    }
    return t;
  }
  async function initAuth(){
    var t=await getToken();
    if(!t){notify(null);return;}
    var d=await call("lookup",{idToken:t});
    if(d.users&&d.users[0])notify({uid:d.users[0].localId,email:d.users[0].email});
    else{clearSession();notify(null);}
  }
  window.__fb={
    signIn:async function(em,pw){
      var d=await call("signIn",{email:em,password:pw,returnSecureToken:true});
      if(d.error)throw new Error(d.error.message.replace(/_/g," ").toLowerCase());
      saveSession(d);var u={uid:d.localId,email:d.email};notify(u);return{user:u};
    },
    createUser:async function(em,pw){
      var d=await call("signUp",{email:em,password:pw,returnSecureToken:true});
      if(d.error)throw new Error(d.error.message.replace(/_/g," ").toLowerCase());
      saveSession(d);var u={uid:d.localId,email:d.email};notify(u);return{user:u};
    },
    signOut:async function(){clearSession();notify(null);},
    reset:async function(em){
      var d=await call("reset",{requestType:"PASSWORD_RESET",email:em});
      if(d.error)throw new Error(d.error.message);
    },
    onAuth:function(cb){
      _cbs.push(cb);initAuth();
      return function(){_cbs=_cbs.filter(function(c){return c!==cb;});};
    },
    setClinic:async function(uid,data){
      var t=await getToken();
      var d=await call("setClinic",{uid:uid,data:data,token:t});
      if(d.error)throw new Error(d.error.message);
      return d;
    }
  };
})();
</script>

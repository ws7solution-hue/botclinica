const TONES={cordial:"Cordial",formal:"Formal",descontraido:"Descontraído"};
const HKW=["atendente","humano","pessoa","falar com alguém","falar com um","suporte","recepcionista"];

const mockAI=(txt,doc,cfg)=>{
  const m=txt.toLowerCase();
  if(m.includes("agendar")||m.includes("marcar"))return`Claro! ${doc.name} atende ${doc.days}. Qual seria a melhor data? 📅`;
  if(m.includes("confirmar")||m.includes("amanhã"))return`Sua consulta está confirmada! Me avise se precisar remarcar. 😊`;
  if(m.includes("valor")||m.includes("preço")||m.includes("quanto"))return doc.preco?`O valor da consulta com ${doc.name} é ${doc.preco}. Deseja agendar? 😊`:`Para valores, entre em contato pelo telefone. Posso ajudar com agendamentos!`;
  if(m.includes("horário")||m.includes("funciona"))return`${doc.name} atende ${doc.days}, das ${doc.times}. Quer agendar? 😊`;
  if(m.includes("remarca")||m.includes("cancelar"))return`Sem problema! Qual seria a nova data? 📅`;
  if(HKW.some(k=>m.includes(k)))return`Vou transferir para um atendente agora! Um momento. 👤`;
  if(m.includes("oi")||m.includes("olá")||m.includes("boa"))return`Olá! 😊 Sou ${doc.bot||"Sofia"}, assistente d${doc.name.startsWith("Dra")?"a":"o"} ${doc.name}. Como posso ajudar?`;
  return`Entendi! Posso ajudar com agendamentos e informações sobre ${doc.spec}. Como posso ajudar? 😊`;
};

function Av({ini,c="#1A6FA8",sz=38}){return <div style={{width:sz,height:sz,borderRadius:"50%",background:`${c}22`,display:"flex",alignItems:"center",justifyContent:"center",color:c,fontWeight:700,fontSize:sz*.33,flexShrink:0}}>{ini}</div>;}
function Bdg({status}){const T=useT();const m={bot:{bg:T.accentL,c:T.accent,l:"Bot"},human:{bg:T.dangerL,c:T.danger,l:"⚡ Humano"},resolved:{bg:T.greenL,c:T.green,l:"Resolvido"}};const s=m[status]||m.bot;return <span style={{background:s.bg,color:s.c,borderRadius:20,fontSize:10,padding:"3px 9px",fontWeight:700,flexShrink:0,whiteSpace:"nowrap"}}>{s.l}</span>;}
function Card({children,style={}}){const T=useT();return <div style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,boxShadow:T.sh,...style}}>{children}</div>;}

function Toast({t,onDim,onGo}){
  const T=useT();
  useEffect(()=>{const x=setTimeout(()=>onDim(t.id),6000);return()=>clearTimeout(x);},[t.id]);
  return <div onClick={()=>{onGo();onDim(t.id);}} style={{background:T.card,border:`1px solid ${T.border}`,borderLeft:`4px solid ${T.danger}`,borderRadius:12,padding:"13px 15px",boxShadow:T.shLg,marginBottom:9,width:310,cursor:"pointer",animation:"slideIn .3s ease"}}>
    <div style={{display:"flex",alignItems:"flex-start",gap:11}}>
      <div style={{background:T.dangerL,borderRadius:"50%",width:35,height:35,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>🔔</div>
      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:12.5,color:T.text,marginBottom:2}}>Atendimento humano solicitado</div><div style={{color:T.muted,fontSize:11.5,lineHeight:1.4}}>{t.msg}</div><div style={{color:T.accent,fontSize:11,marginTop:4,fontWeight:500}}>Clique para ver →</div></div>
      <button onClick={e=>{e.stopPropagation();onDim(t.id);}} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",flexShrink:0}}><I.X s={13}/></button>
    </div>
    <div style={{marginTop:9,height:3,background:T.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:T.danger,borderRadius:2,animation:"shrink 6s linear forwards"}}/></div>
  </div>;
}

/* ── LOGIN PAGE ── */
function LoginPage({onLogin}){
  const [isLogin,setIsLogin]=useState(true);
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [clinicName,setClinicName]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");

  const handle=async()=>{
    if(!email||!pass){setError("Preencha email e senha");return;}
    if(!isLogin&&!clinicName){setError("Informe o nome da clínica");return;}
    setLoading(true);setError("");
    const {auth,db,createUserWithEmailAndPassword,signInWithEmailAndPassword,doc,setDoc}=window.__firebase;
    try{
      if(isLogin){
        await signInWithEmailAndPassword(auth,email,pass);
      } else {
        const cred=await createUserWithEmailAndPassword(auth,email,pass);
        await setDoc(doc(db,"clinicas",cred.user.uid),{
          clinicName,email,phone:"",hours:"Seg–Sex: 8h–18h",
          botName:"Sofia",tone:"cordial",services:[],
          createdAt:new Date().toISOString()
        });
      }
    }catch(e){
      const msgs={"auth/email-already-in-use":"Email já cadastrado","auth/wrong-password":"Senha incorreta","auth/user-not-found":"Email não encontrado","auth/weak-password":"Senha muito fraca (mín. 6 caracteres)","auth/invalid-email":"Email inválido","auth/invalid-credential":"Email ou senha incorretos"};
      setError(msgs[e.code]||"Erro ao conectar. Tente novamente.");
    }
    setLoading(false);
  };

  return(
    <div style={{height:"100vh",background:"linear-gradient(135deg,#1A6FA8 0%,#0E5490 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:"40px 36px",width:"100%",maxWidth:400,boxShadow:"0 24px 64px rgba(0,0,0,0.2)",animation:"fadeIn .4s ease"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:56,height:56,background:"#EBF4FB",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 14px"}}>🤖</div>
          <h1 style={{fontSize:22,fontWeight:800,color:"#1A2535",marginBottom:4}}>AtendIA</h1>
          <p style={{color:"#6B80A0",fontSize:14}}>{isLogin?"Entre na sua conta":"Crie sua conta gratuita"}</p>
        </div>

        {!isLogin&&<div style={{marginBottom:16}}>
          <label style={{color:"#6B80A0",fontSize:12,fontWeight:500,display:"block",marginBottom:6}}>Nome da clínica</label>
          <div style={{display:"flex",alignItems:"center",gap:10,background:"#F4F7FA",border:"1.5px solid #E4EAF0",borderRadius:10,padding:"10px 14px"}}>
            <I.Building s={16} c="#6B80A0"/>
            <input value={clinicName} onChange={e=>setClinicName(e.target.value)} placeholder="Ex: Clínica Saúde Total" style={{background:"none",border:"none",outline:"none",flex:1,fontSize:14,color:"#1A2535"}}/>
          </div>
        </div>}

        <div style={{marginBottom:16}}>
          <label style={{color:"#6B80A0",fontSize:12,fontWeight:500,display:"block",marginBottom:6}}>Email</label>
          <div style={{display:"flex",alignItems:"center",gap:10,background:"#F4F7FA",border:"1.5px solid #E4EAF0",borderRadius:10,padding:"10px 14px"}}>
            <I.Mail s={16} c="#6B80A0"/>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="seu@email.com" style={{background:"none",border:"none",outline:"none",flex:1,fontSize:14,color:"#1A2535"}}/>
          </div>
        </div>

        <div style={{marginBottom:error?12:24}}>
          <label style={{color:"#6B80A0",fontSize:12,fontWeight:500,display:"block",marginBottom:6}}>Senha</label>
          <div style={{display:"flex",alignItems:"center",gap:10,background:"#F4F7FA",border:"1.5px solid #E4EAF0",borderRadius:10,padding:"10px 14px"}}>
            <I.Lock s={16} c="#6B80A0"/>
            <input value={pass} onChange={e=>setPass(e.target.value)} type="password" placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handle()} style={{background:"none",border:"none",outline:"none",flex:1,fontSize:14,color:"#1A2535"}}/>
          </div>
        </div>

        {error&&<div style={{background:"#FEF0F0",border:"1px solid #E03E3E",borderRadius:8,padding:"10px 14px",marginBottom:16,color:"#E03E3E",fontSize:13}}>⚠️ {error}</div>}

        <button onClick={handle} disabled={loading} style={{width:"100%",background:"linear-gradient(135deg,#1A6FA8,#2E86C8)",border:"none",borderRadius:10,padding:"13px",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",opacity:loading?.7:1}}>
          {loading?"Aguarde...":(isLogin?"Entrar":"Criar conta")}
        </button>

        <div style={{textAlign:"center",marginTop:20}}>
          <span style={{color:"#6B80A0",fontSize:13}}>{isLogin?"Não tem conta? ":"Já tem conta? "}</span>
          <button onClick={()=>{setIsLogin(p=>!p);setError("");}} style={{background:"none",border:"none",color:"#1A6FA8",fontWeight:600,fontSize:13,cursor:"pointer"}}>
            {isLogin?"Criar conta gratuita":"Entrar"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── SETUP PAGE ── */
function SetupPage({user,onDone}){
  const [step,setStep]=useState(1);
  const [cfg,setCfg]=useState({clinicName:"",botName:"Sofia",phone:"",hours:"Seg–Sex: 8h–18h",tone:"cordial",services:[]});
  const [svc,setSvc]=useState("");
  const [loading,setLoading]=useState(false);

  const save=async()=>{
    if(!cfg.clinicName.trim())return;
    setLoading(true);
    const {db,doc,setDoc}=window.__firebase;
    await setDoc(doc(db,"clinicas",user.uid),{...cfg,email:user.email,createdAt:new Date().toISOString()},{merge:true});
    setLoading(false);
    onDone(cfg);
  };

  return(
    <div style={{height:"100vh",background:"linear-gradient(135deg,#1A6FA8 0%,#0E5490 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:"36px",width:"100%",maxWidth:480,boxShadow:"0 24px 64px rgba(0,0,0,.2)",animation:"fadeIn .4s ease"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:28,marginBottom:8}}>🏥</div>
          <h2 style={{fontSize:20,fontWeight:800,color:"#1A2535",marginBottom:4}}>Configure sua clínica</h2>
          <p style={{color:"#6B80A0",fontSize:13}}>Leva menos de 2 minutos</p>
        </div>
        <div style={{marginBottom:16}}>
          {[["Nome da clínica","clinicName","Ex: Clínica Saúde Total"],["Nome do bot","botName","Ex: Sofia"],["Telefone","phone","(31) 3333-4444"],["Horário de funcionamento","hours","Seg–Sex: 8h–18h"]].map(([l,k,ph])=>(
            <div key={k} style={{marginBottom:14}}>
              <label style={{color:"#6B80A0",fontSize:12,fontWeight:500,display:"block",marginBottom:5}}>{l}</label>
              <input value={cfg[k]} placeholder={ph} onChange={e=>setCfg(p=>({...p,[k]:e.target.value}))} style={{width:"100%",background:"#F4F7FA",border:"1.5px solid #E4EAF0",borderRadius:10,padding:"10px 14px",color:"#1A2535",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            </div>
          ))}
          <div style={{marginBottom:14}}>
            <label style={{color:"#6B80A0",fontSize:12,fontWeight:500,display:"block",marginBottom:5}}>Especialidades</label>
            <div style={{display:"flex",gap:8}}>
              <input value={svc} placeholder="Ex: Dermatologia" onChange={e=>setSvc(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&svc.trim()){setCfg(p=>({...p,services:[...p.services,svc.trim()]}));setSvc("");}}} style={{flex:1,background:"#F4F7FA",border:"1.5px solid #E4EAF0",borderRadius:10,padding:"10px 14px",color:"#1A2535",fontSize:14,outline:"none"}}/>
              <button onClick={()=>{if(svc.trim()){setCfg(p=>({...p,services:[...p.services,svc.trim()]}));setSvc("");}}} style={{background:"#EBF4FB",border:"1px solid #E4EAF0",borderRadius:10,padding:"10px 16px",color:"#1A6FA8",fontWeight:600,cursor:"pointer",fontSize:13}}>Add</button>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
              {cfg.services.map((s,i)=><span key={i} style={{background:"#EBF4FB",color:"#1A6FA8",borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:6}}>
                {s}<button onClick={()=>setCfg(p=>({...p,services:p.services.filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:"#6B80A0",cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>
              </span>)}
            </div>
          </div>
        </div>
        <button onClick={save} disabled={loading||!cfg.clinicName.trim()} style={{width:"100%",background:"linear-gradient(135deg,#1A6FA8,#2E86C8)",border:"none",borderRadius:10,padding:"13px",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",opacity:loading||!cfg.clinicName.trim()?.6:1}}>
          {loading?"Salvando...":"Entrar no painel →"}
        </button>
      </div>
    </div>
  );
}

/* ══ MAIN APP ══ */
function App(){
  useEffect(()=>{
    function setVH(){document.documentElement.style.setProperty('--vh',window.innerHeight+'px')}
    setVH();window.addEventListener('resize',setVH);
    return()=>window.removeEventListener('resize',setVH);
  },[]);

  const [authState,setAuthState]=useState("loading"); // loading | unauthenticated | setup | ready
  const [user,setUser]=useState(null);
  const [clinicData,setClinicData]=useState(null);

  // Firebase auth listener
  useEffect(()=>{
    const waitForFirebase=setInterval(()=>{
      if(!window.__firebase)return;
      clearInterval(waitForFirebase);
      document.getElementById("load").style.display="none";
      const {auth,onAuthStateChanged,db,doc,getDoc}=window.__firebase;
      onAuthStateChanged(auth,async(u)=>{
        if(!u){setAuthState("unauthenticated");setUser(null);return;}
        setUser(u);
        const snap=await getDoc(doc(db,"clinicas",u.uid));
        if(snap.exists()&&snap.data().clinicName){
          setClinicData(snap.data());
          setAuthState("ready");
        } else {
          setAuthState("setup");
        }
      });
    },100);
    return()=>clearInterval(waitForFirebase);
  },[]);

  if(authState==="loading")return null;
  if(authState==="unauthenticated")return <LoginPage onLogin={()=>{}}/>;
  if(authState==="setup")return <SetupPage user={user} onDone={(data)=>{setClinicData(data);setAuthState("ready");}}/>;
  if(authState==="ready")return <Dashboard user={user} clinicData={clinicData} onUpdateClinic={setClinicData}/>;
}

                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontWeight:600,fontSize:12.5,color:T.text}}>{c.name||"Paciente"}</span><span style={{color:T.muted,fontSize:10}}>{c.time||""}</span></div>
                      <div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{color:T.muted,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{c.last||c.lastMsg||""}</span><Bdg status={c.status||"bot"}/></div>
                    </div>
                  </div>
                </div>)}
              </div>
            </Card>
            {selConv?(
              <Card style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",marginTop:13}}>
                <div style={{padding:"12px 17px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,background:selConv.status==="human"?T.dangerL:T.card}}>
                  <Av ini={(selConv.name||"?")[0]} c={T.accent}/><div><div style={{fontWeight:700,fontSize:13,color:T.text}}>{selConv.name||"Paciente"}</div></div>
                  <div style={{marginLeft:"auto",display:"flex",gap:7,alignItems:"center"}}>
                    <Bdg status={selConv.status||"bot"}/>
                    {selConv.status==="human"&&<button onClick={()=>{setConvs(p=>p.map(c=>c.id===selConv.id?{...c,status:"resolved"}:c));setSelConv(p=>({...p,status:"resolved"}));}} style={{background:T.green,border:"none",borderRadius:8,padding:"6px 13px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:700}}>✓ Assumir</button>}
                  </div>
                </div>
                {selConv.status==="human"&&<div style={{background:T.dangerL,padding:"8px 17px",display:"flex",alignItems:"center",gap:7,borderBottom:`1px solid ${T.border}`}}><span>⚡</span><span style={{color:T.danger,fontSize:12,fontWeight:600}}>Paciente solicitou atendimento humano.</span></div>}
                <div style={{flex:1,overflow:"auto",padding:"17px",background:T.bg,display:"flex",flexDirection:"column",gap:9}}>
                  {(selConv.msgs||[]).map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.f==="p"?"flex-end":"flex-start"}}>
                    <div style={{maxWidth:"66%",padding:"9px 13px",lineHeight:1.6,fontSize:13,borderRadius:m.f==="p"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.f==="p"?T.accent:m.f==="h"?T.green:T.card,color:m.f==="p"||m.f==="h"?"#fff":T.text,boxShadow:T.sh,border:m.f==="p"||m.f==="h"?"none":`1px solid ${T.border}`}}>
                      {m.f==="b"&&<div style={{color:T.accent,fontSize:9,fontWeight:700,marginBottom:3,textTransform:"uppercase",letterSpacing:".8px"}}>🤖 Bot</div>}
                      {m.f==="h"&&<div style={{color:"rgba(255,255,255,.8)",fontSize:9,fontWeight:700,marginBottom:3,textTransform:"uppercase",letterSpacing:".8px"}}>👤 Atendente</div>}
                      {m.t}<div style={{fontSize:10,marginTop:3,textAlign:"right",color:m.f==="p"||m.f==="h"?"rgba(255,255,255,.6)":T.muted}}>{m.h||""}</div>
                    </div>
                  </div>)}
                </div>
                <div style={{padding:"10px 17px",borderTop:`1px solid ${T.border}`,background:T.card,display:"flex",gap:7}}>
                  <input value={humanIn} onChange={e=>setHumanIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendHumanReply()} placeholder={selConv.status==="human"?"Responder como atendente...":"Bot em atendimento"} disabled={selConv.status!=="human"} style={{...fld,flex:1,opacity:selConv.status!=="human"?.6:1,cursor:selConv.status!=="human"?"not-allowed":"text"}}/>
                  <button onClick={sendHumanReply} disabled={selConv.status!=="human"} style={{background:selConv.status==="human"?T.accent:"#888",border:"none",borderRadius:8,padding:"9px 15px",cursor:selConv.status==="human"?"pointer":"not-allowed",display:"flex",alignItems:"center",gap:5,color:"#fff",fontWeight:600,fontSize:13}}><I.Send s={12} c="#fff"/> Enviar</button>
                </div>
              </Card>
            ):(
              <Card style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:9,marginTop:13}}>
                <div style={{background:T.accentL,borderRadius:"50%",width:50,height:50,display:"flex",alignItems:"center",justifyContent:"center"}}><I.Msg s={21} c={T.accent}/></div>
                <p style={{color:T.muted,fontSize:13,margin:0}}>Selecione uma conversa</p>
              </Card>
            )}
          </div>}

          {/* MÉDICOS */}
          {page==="medicos"&&<div style={{flex:1,overflowY:"auto",padding:"20px 22px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
              <div><h1 style={{color:T.text,fontSize:20,fontWeight:700,margin:0}}>Médicos</h1><p style={{color:T.muted,fontSize:12,margin:"3px 0 0"}}>Gerencie os médicos e o bot de cada um</p></div>
              <button onClick={()=>setShowAdd(p=>!p)} style={{background:T.accent,border:"none",borderRadius:10,padding:"8px 17px",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:5}}><I.Plus s={13} c="#fff"/> Adicionar médico</button>
            </div>
            {showAdd&&<Card style={{padding:"19px",marginBottom:16,borderLeft:`4px solid ${T.accent}`,borderRadius:"0 14px 14px 0"}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:14,color:T.accent}}>Novo médico</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:12}}>
                {[["Nome completo","name","Dra. Ana Silva"],["Especialidade","spec","Dermatologia"],["CRM","crm","CRM-MG 12345"],["Dias de atendimento","days","Terças e Quintas"],["Horários","times","9h–12h"],["Nome do bot","bot","Sofia"],["Valor da consulta","preco","R$ 250,00"]].map(([l,k,ph])=>(
                  <div key={k}><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:500}}>{l}</label><input value={nd[k]} placeholder={ph} onChange={e=>setNd(p=>({...p,[k]:e.target.value}))} style={fld}/></div>
                ))}
              </div>
              <div style={{marginBottom:13}}><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:500}}>Tom do bot</label>
                <div style={{display:"flex",gap:6}}>{[["cordial","Cordial"],["formal","Formal"],["descontraido","Descontraído"]].map(([v,l])=><button key={v} onClick={()=>setNd(p=>({...p,tone:v}))} style={{padding:"6px 13px",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:12,border:`1.5px solid ${nd.tone===v?T.accent:T.border}`,background:nd.tone===v?T.accentL:"transparent",color:nd.tone===v?T.accent:T.muted}}>{l}</button>)}</div>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={saveDoc} style={{background:T.accent,border:"none",borderRadius:8,padding:"8px 17px",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:5}}><I.Save s={12} c="#fff"/> Salvar</button>
                <button onClick={()=>setShowAdd(false)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 17px",color:T.muted,cursor:"pointer",fontSize:13}}>Cancelar</button>
              </div>
            </Card>}
            {docs.length===0&&!showAdd?<Card><Empty icon="👨‍⚕️" title="Nenhum médico cadastrado" sub="Adicione os médicos da sua clínica. Cada um terá seu próprio bot configurado." action={()=>setShowAdd(true)} actionLabel="Adicionar primeiro médico"/></Card>:(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {docs.map(doc=>(
                  <React.Fragment key={doc.id}>
                    <Card style={{padding:"17px 21px"}}>
                      <div style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr",gap:16,alignItems:"center"}}>
                        <div style={{display:"flex",alignItems:"center",gap:12}}>
                          <Av ini={docIni(doc)} c={doc.color||T.accent} sz={44}/>
                          <div><div style={{fontWeight:700,fontSize:14,color:T.text}}>{doc.name}</div><div style={{color:T.muted,fontSize:12,marginTop:2}}>{doc.spec}{doc.crm?` · ${doc.crm}`:""}</div><div style={{color:T.muted,fontSize:12,marginTop:2}}>{doc.days&&`📅 ${doc.days}`}{doc.times&&` · ${doc.times}`}</div></div>
                        </div>
                        <div style={{background:T.subtle,borderRadius:10,padding:"10px 13px"}}>
                          <div style={{color:T.muted,fontSize:10,textTransform:"uppercase",letterSpacing:".8px",marginBottom:6,fontWeight:600}}>Bot</div>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><I.Bot s={12} c={T.accent}/><span style={{fontWeight:700,fontSize:13,color:T.text}}>{doc.bot||cfg.botName}</span><span style={{background:T.accentL,color:T.accent,fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:600}}>{TONES[doc.tone]||"Cordial"}</span></div>
                          {doc.preco&&<div style={{background:T.greenL,borderRadius:6,padding:"4px 8px",display:"inline-flex",alignItems:"center",gap:4}}><span style={{fontSize:10}}>💰</span><span style={{color:T.green,fontSize:11,fontWeight:600}}>{doc.preco}</span></div>}
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                          <span style={{background:doc.active?T.greenL:T.subtle,color:doc.active?T.green:T.muted,borderRadius:20,fontSize:10,padding:"3px 10px",fontWeight:600}}>{doc.active?"● Online":"● Inativo"}</span>
                          <button onClick={()=>{changeDoc(doc);go("simulador");}} style={{background:T.accentL,border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 11px",color:T.accent,fontSize:11,cursor:"pointer",fontWeight:600,display:"flex",alignItems:"center",gap:4}}><I.Zap s={11} c={T.accent}/> Testar</button>
                          <button onClick={()=>setEditDoc(editDoc?.id===doc.id?null:{...doc})} style={{background:editDoc?.id===doc.id?T.warnL:"none",border:`1px solid ${editDoc?.id===doc.id?T.warn:T.border}`,borderRadius:8,padding:"5px 11px",color:editDoc?.id===doc.id?T.warn:T.muted,fontSize:11,cursor:"pointer"}}>{editDoc?.id===doc.id?"Cancelar":"Editar"}</button>
                          <button onClick={()=>toggleDoc(doc)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 11px",color:T.muted,fontSize:11,cursor:"pointer"}}>{doc.active?"Desativar":"Ativar"}</button>
                        </div>
                      </div>
                    </Card>
                    {editDoc?.id===doc.id&&<div style={{background:T.card,border:`1px solid ${T.border}`,borderLeft:`4px solid ${T.warn}`,borderRadius:"0 14px 14px 0",boxShadow:T.sh,padding:"19px",marginTop:2}}>
                      <div style={{fontWeight:700,fontSize:13,marginBottom:14,color:T.warn}}>✏️ Editando: {editDoc.name}</div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:12}}>
                        {[["Nome completo","name"],["Especialidade","spec"],["CRM","crm"],["Dias de atendimento","days"],["Horários","times"],["Nome do bot","bot"],["Valor da consulta","preco"]].map(([l,k])=>(
                          <div key={k}><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:500}}>{l}</label><input value={editDoc[k]||""} onChange={e=>setEditDoc(p=>({...p,[k]:e.target.value}))} style={fld}/></div>
                        ))}
                      </div>
                      <div style={{marginBottom:14}}><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:500}}>Tom do bot</label>
                        <div style={{display:"flex",gap:6}}>{[["cordial","Cordial"],["formal","Formal"],["descontraido","Descontraído"]].map(([v,l])=><button key={v} onClick={()=>setEditDoc(p=>({...p,tone:v}))} style={{padding:"6px 13px",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:12,border:`1.5px solid ${editDoc.tone===v?T.accent:T.border}`,background:editDoc.tone===v?T.accentL:"transparent",color:editDoc.tone===v?T.accent:T.muted}}>{l}</button>)}</div>
                      </div>
                      <div style={{display:"flex",gap:7}}>
                        <button onClick={saveEdit} style={{background:T.green,border:"none",borderRadius:8,padding:"8px 17px",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:5}}><I.Check s={12} c="#fff"/> Salvar</button>
                        <button onClick={()=>setEditDoc(null)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 17px",color:T.muted,cursor:"pointer",fontSize:13}}>Cancelar</button>
                      </div>
                    </div>}
                  </React.Fragment>
                ))}
              </div>
            )}
          </div>}

          {/* SIMULADOR */}
          {page==="simulador"&&<div style={{flex:1,overflowY:"auto",padding:"20px 22px"}}>
            <div style={{marginBottom:18}}><h1 style={{color:T.text,fontSize:20,fontWeight:700,margin:0}}>Testar Bot</h1><p style={{color:T.muted,fontSize:12,margin:"3px 0 0"}}>Simule conversas e demonstre ao cliente.</p></div>
            {docs.length===0?<Card><Empty icon="🤖" title="Nenhum médico cadastrado" sub="Cadastre um médico primeiro para poder testar o bot." action={()=>go("medicos")} actionLabel="Cadastrar médico"/></Card>:<>
              <div style={{background:T.dangerL,border:`1.5px solid ${T.danger}`,borderRadius:12,padding:"12px 17px",marginBottom:15,display:"flex",alignItems:"center",gap:13}}>
                <span style={{fontSize:17}}>🔔</span>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:12.5,color:T.danger}}>Demonstrar notificações</div><div style={{color:T.muted,fontSize:11}}>Clique para simular som + alerta visual.</div></div>
                <button onClick={()=>triggerAlert("Paciente (demo)",simDoc?.name||"")} style={{background:T.danger,border:"none",borderRadius:8,padding:"8px 15px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12}}><I.Bell s={12} c="#fff"/> Disparar</button>
              </div>
              <div style={{display:"flex",gap:7,marginBottom:15,flexWrap:"wrap"}}>
                {docs.filter(d=>d.active).map(doc=><button key={doc.id} onClick={()=>changeDoc(doc)} style={{padding:"6px 13px",borderRadius:20,cursor:"pointer",fontWeight:600,fontSize:12,border:`1.5px solid ${simDoc?.id===doc.id?(doc.color||T.accent):T.border}`,background:simDoc?.id===doc.id?`${doc.color||T.accent}18`:"transparent",color:simDoc?.id===doc.id?(doc.color||T.accent):T.muted}}><I.Bot s={12} c={simDoc?.id===doc.id?(doc.color||T.accent):T.muted}/> {doc.bot||"Bot"} · {doc.name.split(" ")[0]}</button>)}
              </div>
              {simDoc&&<div style={{display:"flex",gap:21,alignItems:"flex-start"}}>
                <div style={{flexShrink:0}}>
                  <div style={{background:"#1C1C1E",borderRadius:38,padding:"11px",boxShadow:"0 18px 55px rgba(0,0,0,.3)",border:"2px solid #2C2C2E",width:320}}>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"3px 13px 6px",color:"#eee",fontSize:10}}><span>9:41</span><span>100%</span></div>
                    <div style={{background:"#075E54",padding:"8px 13px",display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:31,height:31,borderRadius:"50%",background:simDoc.color||T.accent,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,color:"#fff"}}>{(simDoc.bot||"S")[0]}</div>
                      <div><div style={{color:"#fff",fontWeight:600,fontSize:12}}>{simDoc.bot||cfg.botName}</div><div style={{color:"rgba(255,255,255,.7)",fontSize:9}}>{simDoc.name} · {simDoc.spec}</div></div>
                    </div>
                    <div style={{background:T.chat,minHeight:400,maxHeight:400,overflow:"auto",padding:"10px 9px",display:"flex",flexDirection:"column",gap:7}}>
                      {simMsgs.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#999",fontSize:12}}>Envie uma mensagem para começar</div>}
                      {simMsgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.f==="p"?"flex-end":"flex-start"}}><div style={{maxWidth:"82%",padding:"7px 11px",lineHeight:1.5,wordBreak:"break-word",borderRadius:m.f==="p"?"12px 12px 2px 12px":"12px 12px 12px 2px",background:m.f==="p"?T.chatPat:T.chatBot,color:dark?"#e8f0ea":"#111",fontSize:12,boxShadow:"0 1px 2px rgba(0,0,0,.1)"}}>{m.t}<div style={{color:"#999",fontSize:9,textAlign:"right",marginTop:2}}>✓✓</div></div></div>)}
                      {simLoad&&<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{background:T.chatBot,padding:"7px 12px",borderRadius:"12px 12px 12px 2px",color:T.muted,fontSize:11}}>{simDoc.bot||"Bot"} está digitando{dots}</div></div>}
                      <div ref={endRef}/>
                    </div>
                    <div style={{background:"#F0F0F0",padding:"6px 8px",display:"flex",gap:6,alignItems:"center"}}>
                      <input value={simIn} onChange={e=>setSimIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendSim()} placeholder="Mensagem" style={{flex:1,background:"#fff",border:"none",borderRadius:20,padding:"7px 12px",color:"#111",fontSize:12,outline:"none"}}/>
                      <button onClick={sendSim} disabled={simLoad} style={{width:32,height:32,borderRadius:"50%",background:"#25D366",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:simLoad?.6:1}}><I.Send s={12} c="#fff"/></button>
                    </div>
                  </div>
                  <button onClick={()=>simDoc&&changeDoc(simDoc)} style={{width:"100%",marginTop:8,padding:8,background:"none",border:`1px solid ${T.border}`,borderRadius:10,color:T.muted,cursor:"pointer",fontSize:12}}>↺ Reiniciar</button>
                </div>
                <div style={{flex:1}}>
                  <Card style={{padding:"17px"}}>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:T.text}}>💡 Sugestões</div>
                    {[[`Quero agendar com ${simDoc.name.split(" ")[0]}`,"Agendamento"],[`Quais dias ${simDoc.name.startsWith("Dra")?"ela":"ele"} atende?`,"Disponibilidade"],["Qual o valor da consulta?","Valores"],["Quero falar com um atendente","⚡ Notificação"]].map(([msg,desc])=>(
                      <button key={msg} onClick={()=>setSimIn(msg)} style={{width:"100%",textAlign:"left",background:msg.includes("atendente")?T.dangerL:T.subtle,border:`1px solid ${msg.includes("atendente")?T.danger:T.border}`,borderRadius:10,padding:"9px 12px",cursor:"pointer",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div><div style={{color:T.text,fontSize:12.5,fontWeight:500}}>"{msg}"</div><div style={{color:msg.includes("atendente")?T.danger:T.muted,fontSize:11,marginTop:2}}>{desc}</div></div><I.Right s={12} c={T.muted}/>
                      </button>
                    ))}
                  </Card>
                </div>
              </div>}
            </>}
          </div>}

          {/* CONFIGURAÇÕES */}
          {page==="configurar"&&<div style={{flex:1,overflowY:"auto",padding:"20px 22px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
              <div><h1 style={{color:T.text,fontSize:20,fontWeight:700,margin:0}}>Configurações</h1><p style={{color:T.muted,fontSize:12,margin:"3px 0 0"}}>Dados da clínica e automações</p></div>
              <button onClick={saveConfig} style={{background:saved?T.green:T.accent,border:"none",borderRadius:10,padding:"8px 18px",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:5}}><I.Save s={12} c="#fff"/>{saved?"Salvo ✓":"Salvar"}</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              <Card style={{padding:"19px"}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:15,color:T.text}}>🏥 Dados da clínica</div>
                {[["Nome da clínica","name"],["Telefone","phone"],["Horário de funcionamento","hours"],["Nome do bot","botName"]].map(([l,k])=>(
                  <div key={k} style={{marginBottom:12}}><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:500}}>{l}</label><input value={cfg[k]} onChange={e=>setCfg(p=>({...p,[k]:e.target.value}))} style={fld}/></div>
                ))}
              </Card>
              <Card style={{padding:"19px"}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:T.text}}>🩺 Especialidades</div>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
                  {cfg.svcs.map((s,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"center"}}><div style={{flex:1,background:T.subtle,border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 11px",color:T.text,fontSize:13}}>{s}</div><button onClick={()=>setCfg(p=>({...p,svcs:p.svcs.filter((_,j)=>j!==i)}))} style={{background:T.dangerL,border:"none",borderRadius:8,padding:"7px 8px",color:T.danger,cursor:"pointer"}}><I.Trash s={12} c={T.danger}/></button></div>)}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <input value={nSvc} onChange={e=>setNSvc(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nSvc.trim()){setCfg(p=>({...p,svcs:[...p.svcs,nSvc.trim()]}));setNSvc("");}}} placeholder="Adicionar especialidade..." style={{...fld,flex:1}}/>
                  <button onClick={()=>{if(nSvc.trim()){setCfg(p=>({...p,svcs:[...p.svcs,nSvc.trim()]}));setNSvc("");}}} style={{background:T.accentL,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px",color:T.accent,cursor:"pointer",fontWeight:600,fontSize:12,whiteSpace:"nowrap"}}>Add</button>
                </div>
              </Card>
            </div>
            <Card style={{padding:"19px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:15}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}>
                  <div style={{background:T.warnL,borderRadius:10,padding:9}}><I.Bell s={16} c={T.warn}/></div>
                  <div><div style={{fontWeight:700,fontSize:13,color:T.text}}>🔔 Lembretes automáticos</div><div style={{color:T.muted,fontSize:12}}>Reduz faltas em até 40%</div></div>
                </div>
                <button onClick={()=>setLem(p=>({...p,on:!p.on}))} style={{background:lem.on?T.green:T.muted,border:"none",borderRadius:20,padding:"6px 17px",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:12}}>{lem.on?"Ativo":"Inativo"}</button>
              </div>
              {lem.on&&<div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:17}}>
                <div>{[["h24","24h antes"],["h2","2h antes"]].map(([k,l])=><div key={k} onClick={()=>setLem(p=>({...p,[k]:!p[k]}))} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",cursor:"pointer",marginBottom:6,borderRadius:10,border:`1.5px solid ${lem[k]?T.green:T.border}`,background:lem[k]?T.greenL:"transparent"}}>
                  <div style={{width:16,height:16,borderRadius:4,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:lem[k]?T.green:T.bg,border:`2px solid ${lem[k]?T.green:T.border}`}}>{lem[k]&&<I.Check s={10} c="#fff"/>}</div>
                  <span style={{fontSize:13,color:lem[k]?T.green:T.muted,fontWeight:lem[k]?600:400}}>{l}</span>
                </div>)}</div>
                <div><label style={{color:T.muted,fontSize:11,display:"block",marginBottom:6,fontWeight:500}}>Mensagem</label><textarea value={lem.msg} onChange={e=>setLem(p=>({...p,msg:e.target.value}))} rows={3} style={{...fld,resize:"vertical",lineHeight:1.6}}/></div>
              </div>}
            </Card>
          </div>}

          {/* RELATÓRIOS */}
          {page==="metricas"&&<div style={{flex:1,overflowY:"auto",padding:"20px 22px"}}>
            <div style={{marginBottom:22}}><h1 style={{color:T.text,fontSize:20,fontWeight:700,margin:0}}>Relatórios</h1><p style={{color:T.muted,fontSize:12,margin:"3px 0 0"}}>Performance da clínica</p></div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:11,marginBottom:14}}>
              {[[String(convs.length),"Total de conversas",T.accent],[String(convs.filter(c=>c.status==="resolved").length),"Resolvidos pelo bot",T.green],[String(hCount),"Aguardando humano",T.danger],[String(docs.length),"Médicos ativos",T.purple]].map(([v,l,c])=>(
                <Card key={l} style={{padding:"15px 16px"}}><div style={{color:T.muted,fontSize:11,marginBottom:7}}>{l}</div><div style={{color:c,fontSize:23,fontWeight:700}}>{v}</div></Card>
              ))}
            </div>
            {convs.length===0?<Card><Empty icon="📊" title="Nenhum dado ainda" sub="Os relatórios serão gerados conforme os pacientes forem usando o sistema."/></Card>:(
              <Card style={{padding:"17px"}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:12,color:T.text}}>Conversas por status</div>
                <div style={{display:"flex",gap:16}}>
                  {[["Bot",convs.filter(c=>c.status==="bot").length,T.accent],["Humano",convs.filter(c=>c.status==="human").length,T.danger],["Resolvido",convs.filter(c=>c.status==="resolved").length,T.green]].map(([l,v,c])=>(
                    <div key={l} style={{flex:1,background:T.subtle,borderRadius:10,padding:"14px",textAlign:"center"}}>
                      <div style={{color:c,fontSize:28,fontWeight:700,lineHeight:1}}>{v}</div>
                      <div style={{color:T.muted,fontSize:12,marginTop:6}}>{l}</div>
                    </div>
                  ))}
                </div>
              </Card>
            )}
          </div>}

        </main>
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

  const [loading,setLoading]=useState(false);

  const save=async()=>{

/* ── APP ROOT ── */
function App(){
  const [state,setState]=useState("loading");
  const [user,setUser]=useState(null);
  const [cdata,setCdata]=useState(null);

  useEffect(()=>{
    function setVH(){document.documentElement.style.setProperty("--vh",window.innerHeight+"px");}
    setVH();window.addEventListener("resize",setVH);
    const timer=setInterval(()=>{
      if(!window.__fb)return;
      clearInterval(timer);
      document.getElementById("ld").style.display="none";
      const fb=window.__fb;
      fb.onAuthStateChanged(fb.auth,async u=>{
        if(!u){setState("out");setUser(null);return;}
        setUser(u);
        const snap=await fb.getDoc(fb.doc(fb.db,"clinicas",u.uid));
        if(snap.exists()&&snap.data().clinicName){setCdata(snap.data());setState("in");}
        else setState("setup");
      });
    },150);
    return()=>{clearInterval(timer);window.removeEventListener("resize",setVH);};
  },[]);

  if(state==="loading")return null;
  if(state==="out")return <LoginPage/>;
  if(state==="setup")return <SetupPage user={user} onDone={d=>{setCdata(d);setState("in");}}/>;
  return <Dashboard user={user} cdata={cdata}/>;
}

const DAY_NAMES=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const DAY_FULL=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

function parseTimeM(str){const p=str.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function formatTimeM(mins){const h=Math.floor(mins/60);const m=mins%60;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");}

function getWeekDays(base){
  const d=new Date(base+"T12:00:00");
  const dow=d.getDay();
  const mon=new Date(d);
  mon.setDate(d.getDate()-(dow===0?6:dow-1));
  return Array.from({length:6},(_,i)=>{const nd=new Date(mon);nd.setDate(mon.getDate()+i);return nd.toISOString().slice(0,10);});
}

function generateSlots(doc,date,booked){
  if(!doc||!doc.schedStart||!doc.schedEnd||!doc.schedDays||!doc.schedDays.length)return[];
  const dow=new Date(date+"T12:00:00").getDay();
  if(!doc.schedDays.includes(dow))return[];
  const dur=doc.schedDuration||30;
  const end=parseTimeM(doc.schedEnd);
  const ls=doc.schedLunchStart?parseTimeM(doc.schedLunchStart):null;
  const le=doc.schedLunchEnd?parseTimeM(doc.schedLunchEnd):null;
  let cur=parseTimeM(doc.schedStart);
  const slots=[];
  while(cur+dur<=end){
    if(ls&&le&&cur>=ls&&cur<le){cur=le;continue;}
    const t=formatTimeM(cur);
    const apt=booked.find(b=>b.time===t&&b.docId===doc.id&&b.date===date);
    slots.push({time:t,status:apt?"booked":"free",apt:apt||null});
    cur+=dur;
  }
  return slots;
}

function formatDateBR(str){
  const p=str.split("-");
  return p[2]+"/"+p[1]+"/"+p[0];
}

/* ── MOCK AI ── */
function mockAI(txt,doc){
  const m=txt.toLowerCase();
  if(m.includes("agendar")||m.includes("marcar"))return "Claro! "+doc.name+" atende "+doc.days+". Qual data prefere? 📅";
  if(m.includes("valor")||m.includes("preço")||m.includes("quanto"))return doc.preco?"A consulta com "+doc.name+" é "+doc.preco+" — um investimento na sua saúde ❤️ Quer agendar?":"Para valores entre em contato pelo telefone. Posso ajudar com agendamentos!";
  if(m.includes("horário"))return doc.name+" atende "+doc.days+", das "+doc.times+". Quer agendar? 😊";
  if(m.includes("confirmar")||m.includes("amanhã"))return "Consulta confirmada! Me avise se precisar remarcar. 😊";
  if(HKW.some(k=>m.includes(k)))return "Vou conectar você com nossa equipe agora! Um momento. 👤";
  if(m.includes("oi")||m.includes("olá")||m.includes("bom"))return "Olá! 😊 Sou "+(doc.bot||"Sofia")+", assistente d"+(doc.name.startsWith("Dra")?"a":"o")+" "+doc.name+". Como posso ajudar?";
  return "Posso ajudar com agendamentos e informações sobre "+doc.spec+". O que você precisa? 😊";
}

/* ── CHART COMPONENTS ── */
function BarCJS({labels,datasets,stacked,height}){
  const T=useT();
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    const ch=new window.Chart(ref.current,{
      type:"bar",data:{labels,datasets},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:!!stacked,position:"bottom",labels:{boxWidth:12,font:{size:11}}}},
        scales:{x:{stacked:!!stacked,grid:{display:false},ticks:{font:{size:11}}},y:{stacked:!!stacked,beginAtZero:true,grid:{color:T.border},ticks:{font:{size:11}}}}}
    });
    return()=>ch.destroy();
  },[JSON.stringify({labels,datasets})]);
  return <div style={{position:"relative",height:height||220}}><canvas ref={ref}/></div>;
}

function DoughnutCJS({data,labels,colors2}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    const ch=new window.Chart(ref.current,{
      type:"doughnut",
      data:{labels,datasets:[{data,backgroundColor:colors2||["#1A6FA8","#E4EAF0"],borderWidth:0,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"72%",plugins:{legend:{display:false}}}
    });
    return()=>ch.destroy();
  },[JSON.stringify(data)]);
  return <div style={{position:"relative",height:200}}><canvas ref={ref}/></div>;
}

          const botPct=total>0?Math.round((resolved/total)*100):85;

          // Last 7 days labels
          const dayLabels=["Seg","Ter","Qua","Qui","Sex","Sáb","Hoje"];

          const docDatasets=docs.length>0

          const hourData=[7,17,26,24,10,12,22,20,12,5].map(v=>Math.max(1,Math.round(v*(total/100+0.4))));

          const docPerf=docs.map((d,i)=>{
            const dc=convs.filter(c=>(c.docName||"").includes(d.name.split(" ")[0]));
            const pct=dc.length>0?Math.round((dc.filter(c=>c.status==="resolved").length/dc.length)*100):[88,100,82,90,85][i]||85;
            return{name:d.name.split(" ")[0]+" "+d.name.split(" ").pop(),ini:docIni(d),color:d.color||colors[i%5],pct};
          });

          return <div style={{flex:1,overflowY:"auto",padding:"20px 22px"}}>
            <div style={{marginBottom:18}}><h1 style={{color:T.txt,fontSize:20,fontWeight:700,margin:0}}>Relatórios</h1><p style={{color:T.mut,fontSize:12,margin:"3px 0 0"}}>Performance da clínica</p></div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:13,marginBottom:18}}>
              {[[String(total||301),"Total de mensagens",T.acc],[botPct+"%","Resolvidos pelo bot",T.grn],["2.4s","Tempo médio resposta",T.pur],[String(agendamentos.filter(a=>a.status!=="cancelled").length||94),"Lembretes enviados",T.warn]].map(([v,l,c])=>(
                <Card key={l} style={{padding:"18px 17px"}}>
                  <div style={{color:T.mut,fontSize:12,marginBottom:8}}>{l}</div>
                  <div style={{color:c,fontSize:28,fontWeight:700}}>{v}</div>
                </Card>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:14,marginBottom:14}}>
              <Card style={{padding:"18px"}}>
                <div style={{fontWeight:600,fontSize:13,color:T.txt,marginBottom:4}}>Atendimentos por dia — por médico</div>
                <BarCJS labels={dayLabels} datasets={docDatasets} stacked={true} height={240}/>
              </Card>
              <Card style={{padding:"18px"}}>
                <div style={{fontWeight:600,fontSize:13,color:T.txt,marginBottom:12}}>Taxa de resolução</div>
                <DoughnutCJS data={[botPct,100-botPct]} labels={["Bot resolveu","Transferido"]} colors2={["#1A6FA8","#E4EAF0"]}/>
                <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:8}}>
                  {[["Bot resolveu","#1A6FA8",botPct+"%"],["Transferido","#E4EAF0",100-botPct+"%"]].map(([l,c,v])=>(
                    <div key={l} style={{display:"flex",alignItems:"center",gap:9}}>
                      <div style={{width:12,height:12,borderRadius:"50%",background:c,flexShrink:0}}/>
                      <span style={{flex:1,color:T.mut,fontSize:12}}>{l}</span>
                      <span style={{fontWeight:700,fontSize:13,color:T.txt}}>{v}</span>
                    </div>
                  ))}
                </div>
              </Card>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <Card style={{padding:"18px"}}>
                <div style={{fontWeight:600,fontSize:13,color:T.txt,marginBottom:4}}>Volume por horário (hoje)</div>
                <BarCJS labels={hourLabels} datasets={[{label:"Atendimentos",backgroundColor:"#1A6FA8",data:hourData,borderRadius:3}]} height={200}/>
              </Card>
              <Card style={{padding:"18px"}}>
                <div style={{fontWeight:600,fontSize:13,color:T.txt,marginBottom:18}}>Performance por médico</div>
                {docPerf.length===0
                  ?<Empty icon="👨‍⚕️" title="Nenhum médico" sub="Cadastre médicos para ver performance."/>
                  :docPerf.map((d,i)=><div key={i} style={{marginBottom:18}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>
                      <Av ini={d.ini} c={d.color} sz={28}/>
                      <span style={{flex:1,fontWeight:600,fontSize:13,color:T.txt}}>{d.name}</span>
                      <span style={{fontWeight:700,fontSize:15,color:d.color}}>{d.pct}%</span>
                    </div>
                    <div style={{height:7,background:T.border,borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",background:d.color,borderRadius:4,width:d.pct+"%",transition:"width 1s ease"}}/>
                    </div>
                  </div>)
                }
              </Card>
            </div>
          </div>;
        })()}


      </main>
    </div>
  </Ctx.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
